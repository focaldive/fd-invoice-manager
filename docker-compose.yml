services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fd1234}
      POSTGRES_DB: ${POSTGRES_DB:-fd_invoice}
    # Host 5433 → container 5432 (avoids clashing with a local Postgres on 5432)
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-fd_invoice}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Drizzle migrations, then exits. The app waits for it.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-fd1234}@db:5432/${POSTGRES_DB:-fd_invoice}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    # Reuse existing secrets (SESSION_SECRET, AUTH_USERNAME, AUTH_PASSWORD, ...).
    env_file:
      - .env.local
    # DATABASE_URL here overrides whatever .env.local has, pointing at the db service.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-fd1234}@db:5432/${POSTGRES_DB:-fd_invoice}
      NODE_ENV: production
    # Host 3001 → container 3000 (avoids clashing with a local `npm run dev` on 3000)
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
